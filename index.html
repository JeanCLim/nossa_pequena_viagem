<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viagem ao Espaço</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="ui-overlay">
      <h1>Quer viajar comigo para o espaço?</h1>
      <p>Posso te levar para conhecer o universo, só eu e você</p>
      <button id="start-btn">Iniciar viagem</button>
      <div class="credits">criado por Jean, para Raiozinho de Sol</div>
    </div>

    <div id="controls-hint">
      Segure 'W' ou '↑' enquanto viaja para acelerar | 'Shift' para Turbo
    </div>

    <canvas id="spaceCanvas"></canvas>

    <audio id="bg-music" loop>
      <source src="musica.mp3" type="audio/mpeg" />
    </audio>

    <script src="js/script.js"></script>
  </body>
</html>
